<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    
    <title>Yousuf & Nafeesa's Walima Seating</title>
    <style>
        :root {
            --bg-color: #FDFBF7; 
            --text-color: #2B2B2B; 
            --accent-color: #9E1B22; 
            --gold-accent: #D4AF37; 
            --glass-bg: rgba(255, 255, 255, 0.55); 
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.08);
            --nav-bg: rgba(253, 251, 247, 0.85);
            --subtext-color: #555;
            --table-label-color: #888;
            --bevel-color: rgba(255, 255, 255, 0.95);
        }

        body.dark-mode {
            --bg-color: #0A0A0C; 
            --text-color: #FDFBF7; 
            --accent-color: #B22222; 
            --glass-bg: rgba(25, 25, 30, 0.55); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --nav-bg: rgba(10, 10, 12, 0.85);
            --bevel-color: rgba(212, 175, 55, 0.45);
            --subtext-color: #AAA;
            --table-label-color: #999;
        }

        html, body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Georgia', serif; background-color: var(--bg-color);
            color: var(--text-color); margin: 0; padding: 0; min-height: 100vh;
            overflow-x: hidden; transition: background-color 0.8s ease;
            padding-bottom: 90px;
        }

        /* 🌊 THE TRUE LIVE AMBIENT DRIFT */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none;
        }

        .header-image, .container, .bottom-nav, .theme-toggle, .footer { position: relative; z-index: 10; }

        /* Rest of the styles remain exactly the same as your previous working version */
        #golden-wipe { position: fixed; bottom: 0; left: 0; width: 100vw; height: 0; background: linear-gradient(135deg, #D4AF37, #AA8529); z-index: 9000; pointer-events: none; transition: height 0.5s ease; }
        
        .theme-toggle { position: fixed; bottom: 100px; right: 25px; background: var(--glass-bg); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); backdrop-filter: blur(20px); border-radius: 50%; width: 55px; height: 55px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1000; }
        .theme-toggle svg { width: 26px; height: 26px; fill: var(--text-color); }
        
        #celebration-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 8999; }
        
        .search-box { width: 100%; padding: 18px; font-size: 1.2rem; border: 1px solid var(--glass-border); border-radius: 30px; background: var(--glass-bg); backdrop-filter: blur(20px); box-shadow: var(--glass-shadow); text-align: center; color: var(--text-color); }
        
        .result-item { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 18px 20px; margin-top: 15px; border-radius: 16px; backdrop-filter: blur(20px); box-shadow: var(--glass-shadow); cursor: pointer; transition: transform 0.1s ease; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; background: var(--nav-bg); backdrop-filter: blur(25px); display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-item { background: none; border: none; color: var(--table-label-color); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; width: 100%; height: 100%; }
        .nav-item svg { width: 28px; height: 28px; fill: currentColor; }
        .nav-item.active { color: var(--accent-color); }
    </style>
</head>
<body>

    <!-- This canvas will now render the live, organic swirling light-orbs -->
    <canvas id="bg-canvas"></canvas>

    <div id="golden-wipe"></div>
    <canvas id="celebration-canvas"></canvas>

    <!-- (Keep the rest of your body HTML exactly as it was) -->
    <div class="container">
        <!-- Add your HTML content here -->
    </div>

    <script>
        // Live Swirling Background Engine
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let blobs = [
            {x: 100, y: 100, r: 200, vx: 0.5, vy: 0.3, color: '#D4AF37'},
            {x: 400, y: 400, r: 250, vx: -0.3, vy: 0.5, color: '#9E1B22'}
        ];

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function drawBlobs() {
            ctx.clearRect(0, 0, width, height);
            ctx.filter = 'blur(80px)'; // The "magic" blur that makes it liquid
            blobs.forEach(b => {
                b.x += b.vx; b.y += b.vy;
                if (b.x < 0 || b.x > width) b.vx *= -1;
                if (b.y < 0 || b.y > height) b.vy *= -1;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();
            });
            requestAnimationFrame(drawBlobs);
        }

        init();
        drawBlobs();

        // (Keep your existing search/haptic/navigation/celebration JS scripts here)
    </script>
</body>
</html>
